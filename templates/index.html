<!DOCTYPE html>
<html>
<head>
    <title>Two-Tier Flask App</title>
</head>
<body>
    <h1>Messages</h1>

    <form method="POST" action="/add">
        <input type="text" name="message" placeholder="Type a message" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for msg in messages %}
            <li>{{ msg }}</li>
        {% endfor %}
    </ul>
</body>
</html>
